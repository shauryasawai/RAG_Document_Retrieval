{% extends 'base.html' %}
{% block title %}Profile — DocuRAG{% endblock %}
{% block content %}
<div class="container" style="max-width:600px; padding-top:3rem; padding-bottom:3rem;">
  <h1 class="font-display fade-up" style="font-size:1.8rem; font-weight:800; margin-bottom:0.5rem;">Account Settings</h1>
  <p class="text-muted text-sm fade-up-2" style="margin-bottom:2rem;">Manage your profile and API configuration</p>
  <div class="card fade-up-3">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Username</label>
        <input type="text" value="{{ user.username }}" disabled style="opacity:0.5; cursor:not-allowed;">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="text" value="{{ user.email }}" disabled style="opacity:0.5; cursor:not-allowed;">
      </div>
      <div class="form-group">
        <label>Company</label>
        <input type="text" name="company" value="{{ profile.company }}">
      </div>
      <div class="form-group">
        <label>OpenAI API Key</label>
        <input type="password" name="openai_api_key" value="{{ profile.openai_api_key }}" placeholder="sk-...">
        <p class="text-xs text-muted mt-1">Required for AI answer generation. Stored encrypted.</p>
      </div>
      <button type="submit" class="btn btn-primary">Save changes</button>
    </form>
  </div>
</div>
{% endblock %}
