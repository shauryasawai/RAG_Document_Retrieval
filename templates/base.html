<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}DocuRAG{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f8fafc; /* Light background for better contrast */
  --surface: #ffffff;
  --surface2: #f1f5f9;
  --border: #e2e8f0;
  --border-active: #94a3b8;
  --text: #0f172a; /* Very dark text */
  --text-muted: #334155; /* Dark muted text */
  --text-light: #64748b;
  --accent: #2563eb; /* Darker accent */
  --accent2: #db2777;
  --accent3: #059669;
  --warn: #d97706;
  --radius: 12px;
}

/* Dark mode variables */
.dark {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a24;
  --border: #ffffff1a;
  --border-active: #ffffff33;
  --text: #f8fafc;
  --text-muted: #94a3b8;
  --text-light: #64748b;
  --accent: #6c63ff;
  --accent2: #ff6b9d;
  --accent3: #00d4aa;
  --warn: #ffb347;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  position: relative;
}

/* Aurora Background Effect */
.aurora-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
  pointer-events: none;
}

.aurora-effect {
  position: absolute;
  inset: -10px;
  opacity: 0.3;
  background-image: 
    repeating-linear-gradient(100deg, 
      transparent 0%,
      transparent 7%,
      rgba(37, 99, 235, 0.1) 10%,
      rgba(37, 99, 235, 0.1) 12%,
      transparent 16%
    ),
    repeating-linear-gradient(100deg, 
      #2563eb 10%, 
      #7c3aed 15%, 
      #db2777 20%, 
      #4f46e5 25%, 
      #9333ea 30%
    );
  background-size: 300% 200%, 200% 100%;
  background-position: 50% 50%;
  filter: blur(10px);
  animation: aurora 60s linear infinite;
  mix-blend-mode: screen;
}

.dark .aurora-effect {
  opacity: 0.2;
  background-image: 
    repeating-linear-gradient(100deg, 
      #000 0%,
      #000 7%,
      rgba(0, 0, 0, 0.5) 10%,
      rgba(0, 0, 0, 0.5) 12%,
      #000 16%
    ),
    repeating-linear-gradient(100deg, 
      #6c63ff 10%, 
      #a78bfa 15%, 
      #f472b6 20%, 
      #818cf8 25%, 
      #c084fc 30%
    );
  mix-blend-mode: overlay;
}

@keyframes aurora {
  0% {
    background-position: 50% 50%, 50% 50%;
  }
  100% {
    background-position: 350% 50%, 350% 50%;
  }
}

/* Gradient overlay for better text contrast */
.aurora-overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at 50% 50%, transparent 0%, var(--bg) 100%);
  opacity: 0.8;
  pointer-events: none;
  z-index: 0;
}

.dark .aurora-overlay {
  background: radial-gradient(circle at 50% 50%, transparent 0%, #0a0a0f 100%);
}

/* Main content should be above aurora */
nav, main {
  position: relative;
  z-index: 10;
}

nav {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(20px);
  border-bottom: 2px solid var(--border);
  padding: 0 2rem;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.dark nav {
  background: rgba(10, 10, 15, 0.9);
}

.nav-brand {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1.3rem;
  color: var(--text);
  text-decoration: none;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.nav-brand span.dot { 
  color: var(--accent); 
  font-weight: 800;
}

.nav-links { 
  display: flex; 
  align-items: center; 
  gap: 0.5rem; 
}

.nav-links a {
  color: var(--text-muted);
  text-decoration: none;
  font-size: 0.875rem;
  font-weight: 600;
  padding: 0.4rem 0.8rem;
  border-radius: 6px;
  transition: all 0.2s;
}

.nav-links a:hover { 
  color: var(--accent); 
  background: var(--border); 
}

.nav-links .btn-nav {
  background: var(--accent);
  color: white !important;
  padding: 0.4rem 1rem;
  border-radius: 6px;
  font-weight: 700;
}

.nav-links .btn-nav:hover { 
  background: var(--accent2) !important; 
  transform: translateY(-1px);
}

main { 
  position: relative; 
  z-index: 10; 
  min-height: calc(100vh - 60px);
}

.container { 
  max-width: 1200px; 
  margin: 0 auto; 
  padding: 0 2rem; 
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 0.4rem;
  padding: 0.6rem 1.2rem;
  border-radius: var(--radius);
  font-size: 0.875rem;
  font-weight: 700;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all 0.2s;
  text-decoration: none;
  font-family: 'Inter', sans-serif;
  color: var(--text);
}

.btn-primary { 
  background: var(--accent); 
  color: white; 
  font-weight: 700;
}

.btn-primary:hover { 
  background: var(--accent2); 
  transform: translateY(-1px); 
  box-shadow: 0 4px 20px var(--accent); 
}

.btn-secondary { 
  background: var(--surface2); 
  color: var(--text); 
  border: 2px solid var(--border-active); 
  font-weight: 600;
}

.btn-secondary:hover { 
  border-color: var(--accent); 
  color: var(--accent); 
  background: var(--surface);
}

.btn-danger { 
  background: #dc2626; 
  color: white; 
  font-weight: 700;
}

.btn-danger:hover { 
  background: #b91c1c; 
}

.btn-success { 
  background: var(--accent3); 
  color: white; 
  font-weight: 700;
}

.btn-success:hover { 
  background: #047857; 
}

.btn-warn { 
  background: var(--warn); 
  color: white; 
  font-weight: 700;
}

.btn-sm { 
  padding: 0.35rem 0.8rem; 
  font-size: 0.78rem; 
  font-weight: 600;
}

.btn-lg { 
  padding: 0.85rem 2rem; 
  font-size: 1rem; 
  border-radius: 14px; 
}

.card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 1.5rem;
  transition: all 0.2s;
  color: var(--text);
}

.card:hover { 
  border-color: var(--accent); 
  box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
}

.form-group { 
  margin-bottom: 1.2rem; 
}

.form-group label {
  display: block;
  font-size: 0.85rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
}

input[type=text], 
input[type=email], 
input[type=password], 
textarea, 
select {
  width: 100%;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 8px;
  padding: 0.75rem 1rem;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  font-weight: 500;
  transition: all 0.2s;
}

.dark input[type=text],
.dark input[type=email],
.dark input[type=password],
.dark textarea,
.dark select {
  background: #1a1a24;
  border-color: #ffffff1a;
  color: #f0f0f5;
}

input:focus, 
textarea:focus, 
select:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
}

.dark input:focus,
.dark textarea:focus,
.dark select:focus {
  box-shadow: 0 0 0 4px rgba(108, 99, 255, 0.2);
}

input::placeholder,
textarea::placeholder,
select::placeholder {
  color: var(--text-light);
  font-weight: 400;
}

textarea { 
  resize: vertical; 
  min-height: 90px; 
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.3rem 0.75rem;
  border-radius: 999px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.badge-purple { 
  background: rgba(108, 99, 255, 0.15); 
  color: #4f46e5; 
  border: 1px solid rgba(108, 99, 255, 0.3); 
}

.dark .badge-purple {
  color: #a89dff;
}

.badge-green { 
  background: rgba(5, 150, 105, 0.15); 
  color: #047857; 
  border: 1px solid rgba(5, 150, 105, 0.3); 
}

.dark .badge-green {
  color: #00d4aa;
}

.badge-orange { 
  background: rgba(217, 119, 6, 0.15); 
  color: #b45309; 
  border: 1px solid rgba(217, 119, 6, 0.3); 
}

.dark .badge-orange {
  color: #ffb347;
}

.badge-red { 
  background: rgba(220, 38, 38, 0.15); 
  color: #b91c1c; 
  border: 1px solid rgba(220, 38, 38, 0.3); 
}

.dark .badge-red {
  color: #ff6688;
}

.badge-gray { 
  background: var(--surface2); 
  color: var(--text-muted); 
  border: 2px solid var(--border); 
}

.progress-bar { 
  height: 6px; 
  background: var(--surface2); 
  border-radius: 999px; 
  overflow: hidden; 
  border: 1px solid var(--border);
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 999px;
  transition: width 0.6s ease;
}

.alert {
  padding: 1rem 1.2rem;
  border-radius: 12px;
  font-size: 0.9rem;
  margin-bottom: 1rem;
  border: 2px solid;
  font-weight: 600;
}

.alert-success { 
  background: rgba(5, 150, 105, 0.1); 
  border-color: rgba(5, 150, 105, 0.5); 
  color: #047857; 
}

.dark .alert-success {
  color: #00d4aa;
}

.alert-error { 
  background: rgba(220, 38, 38, 0.1); 
  border-color: rgba(220, 38, 38, 0.5); 
  color: #b91c1c; 
}

.dark .alert-error {
  color: #ff6688;
}

.alert-warning { 
  background: rgba(217, 119, 6, 0.1); 
  border-color: rgba(217, 119, 6, 0.5); 
  color: #b45309; 
}

.dark .alert-warning {
  color: #ffb347;
}

.alert-info { 
  background: rgba(37, 99, 235, 0.1); 
  border-color: rgba(37, 99, 235, 0.5); 
  color: #1d4ed8; 
}

.dark .alert-info {
  color: #a89dff;
}

.text-muted { 
  color: var(--text-muted); 
  font-weight: 500;
}

.text-sm { 
  font-size: 0.875rem; 
}

.text-xs { 
  font-size: 0.75rem; 
}

.font-mono { 
  font-family: 'JetBrains Mono', monospace; 
}

.font-display { 
  font-family: 'Syne', sans-serif; 
}

/* Spacing utilities */
.mt-1 { margin-top: 0.5rem; }
.mt-2 { margin-top: 1rem; }
.mt-3 { margin-top: 1.5rem; }
.mt-4 { margin-top: 2rem; }
.mb-1 { margin-bottom: 0.5rem; }
.mb-2 { margin-bottom: 1rem; }
.mb-3 { margin-bottom: 1.5rem; }

/* Flex utilities */
.flex { display: flex; }
.flex-col { flex-direction: column; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.gap-1 { gap: 0.5rem; }
.gap-2 { gap: 1rem; }
.gap-3 { gap: 1.5rem; }
.w-full { width: 100%; }

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--surface); }
::-webkit-scrollbar-thumb { 
  background: var(--border-active); 
  border-radius: 4px; 
}
::-webkit-scrollbar-thumb:hover { 
  background: var(--accent); 
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

.fade-up { animation: fadeUp 0.4s ease both; }
.fade-up-2 { animation: fadeUp 0.4s 0.1s ease both; }
.fade-up-3 { animation: fadeUp 0.4s 0.2s ease both; }
.fade-up-4 { animation: fadeUp 0.4s 0.3s ease both; }

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

.pulse { animation: pulse-dot 1.5s infinite; }

@keyframes spin { 
  to { transform: rotate(360deg); } 
}

.spin { animation: spin 1s linear infinite; }

/* Dark mode toggle button (optional) */
.theme-toggle {
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 30px;
  padding: 0.25rem;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 36px;
  height: 36px;
  transition: all 0.2s;
}

.theme-toggle:hover {
  border-color: var(--accent);
  transform: scale(1.05);
}

.theme-toggle svg {
  width: 20px;
  height: 20px;
  fill: var(--text-muted);
}

.theme-toggle:hover svg {
  fill: var(--accent);
}
</style>
{% block extra_head %}{% endblock %}
</head>
<body>
<!-- Aurora Background -->
<div class="aurora-container">
  <div class="aurora-effect"></div>
  <div class="aurora-overlay"></div>
</div>

<nav>
  <a href="{% url 'dashboard' %}" class="nav-brand">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <rect x="1" y="1" width="9" height="9" rx="2" fill="#2563eb"/>
      <rect x="12" y="1" width="9" height="9" rx="2" fill="#db2777" opacity="0.7"/>
      <rect x="1" y="12" width="9" height="9" rx="2" fill="#059669" opacity="0.7"/>
      <rect x="12" y="12" width="9" height="9" rx="2" fill="#4f46e5" opacity="0.4"/>
    </svg>
    Docu<span class="dot">RAG</span>
  </a>
  <div class="nav-links">
    <!-- Dark mode toggle (optional) -->
    <button class="theme-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">
      <svg viewBox="0 0 24 24">
        <path d="M12 3c.132 0 .263 0 .393 0a7.5 7.5 0 0 0 7.92 12.446a9 9 0 1 1 -8.313-12.454z"/>
      </svg>
    </button>
    
    {% if user.is_authenticated %}
    <a href="{% url 'dashboard' %}">Dashboard</a>
    <a href="{% url 'profile' %}">{{ user.username }}</a>
    <a href="{% url 'logout' %}" class="btn-nav">Sign out</a>
    {% else %}
    <a href="{% url 'login' %}">Sign in</a>
    <a href="{% url 'register' %}" class="btn-nav">Get started</a>
    {% endif %}
  </div>
</nav>

<main>
{% if messages %}
<div class="container" style="padding-top:1.2rem;">
  {% for message in messages %}
  <div class="alert alert-{% if message.tags == 'error' %}error{% elif message.tags == 'warning' %}warning{% elif message.tags == 'success' %}success{% else %}info{% endif %}">
    {{ message }}
  </div>
  {% endfor %}
</div>
{% endif %}
{% block content %}{% endblock %}
</main>

<script>
  // Dark mode handling
  function toggleDarkMode() {
    if (document.documentElement.classList.contains('dark')) {
      document.documentElement.classList.remove('dark');
      localStorage.theme = 'light';
    } else {
      document.documentElement.classList.add('dark');
      localStorage.theme = 'dark';
    }
  }
  
  // Initialize dark mode based on preference
  if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.classList.add('dark');
  } else {
    document.documentElement.classList.remove('dark');
  }
  
  // Update SVG colors based on theme
  function updateThemeColors() {
    const isDark = document.documentElement.classList.contains('dark');
    const navLogo = document.querySelector('.nav-brand svg');
    if (navLogo) {
      const rects = navLogo.querySelectorAll('rect');
      if (isDark) {
        rects[0].setAttribute('fill', '#6c63ff');
        rects[1].setAttribute('fill', '#ff6b9d');
        rects[2].setAttribute('fill', '#00d4aa');
        rects[3].setAttribute('fill', '#6c63ff');
      } else {
        rects[0].setAttribute('fill', '#2563eb');
        rects[1].setAttribute('fill', '#db2777');
        rects[2].setAttribute('fill', '#059669');
        rects[3].setAttribute('fill', '#4f46e5');
      }
    }
  }
  
  // Call on load and when theme changes
  updateThemeColors();
  
  // Observe theme changes
  const observer = new MutationObserver(updateThemeColors);
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
</script>
</body>
</html>
